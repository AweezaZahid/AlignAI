<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ALIGNAI | User Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex">

  <!-- ===== SIDEBAR ===== -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col">
    <div class="p-6 border-b border-slate-700">
      <h1 class="text-xl font-bold text-teal-400">ALIGNAI</h1>
      <p class="text-xs text-slate-400">Posture Coaching Hub</p>
    </div>

    <nav class="flex-1 p-4 space-y-2 text-sm">
        <a href="dashboard-live.html" class="block px-4 py-2 rounded hover:bg-slate-800">Live Monitor</a>
        <a href="dashboard-progress.html" class="block px-4 py-2 rounded hover:bg-slate-800">Progress</a>
    </nav>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 flex flex-col">

    <!-- Top Bar -->
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">
      <h2 class="text-lg font-semibold text-gray-800">User Profile</h2>
      <div class="flex items-center space-x-4">
        <span class="text-gray-600 text-sm">Welcome, <span id="user-name">User</span></span>
      </div>
    </header>

    <!-- Content -->
    <section class="flex-1 p-6">

      <!-- ===== PROFILE CARD ===== -->
      <div class="bg-white rounded-xl shadow p-6 flex flex-col md:flex-row items-center gap-6">

        <!-- Transparent Female Logo -->
        <div class="w-32 h-32 flex items-center justify-center bg-teal-100 rounded-full border-4 border-teal-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2" />
          </svg>
        </div>

        <!-- User Info -->
        <div class="flex-1 space-y-2">
          <h3 id="profile-name" class="text-xl font-bold text-gray-800">Full Name</h3>
          <p id="profile-email" class="text-gray-600">Email@example.com</p>
          <p id="profile-joined" class="text-gray-500 text-sm">Member since: --</p>
        </div>

        <!-- Edit Profile Button -->
        <div>
          <button class="bg-teal-600 text-white px-4 py-2 rounded hover:bg-teal-500 text-sm">
            Edit Profile
          </button>
        </div>
      </div>

    </section>
  </main>

  <script>
    // ===== Example user info =====
    const user = {
      name: "Arsh Lodhi",
      email: "arsh.amir95@gmail.com",
      joined: "2026-01-04"
    };

    document.getElementById('user-name').innerText = user.name;
    document.getElementById('profile-name').innerText = user.name;
    document.getElementById('profile-email').innerText = user.email;
    document.getElementById('profile-joined').innerText = "Member since: " + user.joined;
  </script>

</body>
</html>
