<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ALIGN-AI | Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-700 to-slate-800">

  <!-- Sign Up Card -->
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">

    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-teal-700 tracking-wide">
        ALIGN-AI
      </h1>
      <p class="text-sm text-gray-600 uppercase mt-1">
        Real-Time Posture Detection & Coaching Hub
      </p>
    </div>

    <!-- Title -->
    <h2 class="text-xl font-semibold text-gray-800 text-center mb-6">
      Create Your Account
    </h2>

    <!-- Sign Up Form -->
    <form id="signupForm" class="space-y-5">

      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Full Name
        </label>
        <input type="text" id="full_name" placeholder="Your Name"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-600">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email Address
        </label>
        <input type="email" id="email" placeholder="you@example.com"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-600">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input type="password" id="password" placeholder="••••••••"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-600">
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Confirm Password
        </label>
        <input type="password" id="confirm_password" placeholder="••••••••"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-600">
      </div>

      <!-- Sign Up Button -->
      <button type="submit"
        class="w-full bg-teal-700 text-white font-semibold py-3 rounded-lg hover:bg-teal-600 transition">
        Sign Up
      </button>

    </form>

    <!-- Footer Links -->
    <div class="text-center mt-6">
      <p class="text-sm text-gray-600">
        Already have an account?
        <a href="login.html" class="text-teal-700 font-semibold hover:underline">
          Login
        </a>
      </p>
    </div>

  </div>

  <!--Javascript-->
<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const full_name        = document.getElementById('full_name').value;
    const email            = document.getElementById('email').value;
    const password         = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;

    // Check passwords match before sending
    if (password !== confirm_password) {
      alert('Passwords do not match!');
      return;
    }

    try {
      const res = await fetch('http://127.0.0.1:5000/signup', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ full_name, email, password, confirm_password })
      });

      const data = await res.json();

      if (res.ok) {
        alert('Account created successfully!');
        window.location.href = 'login.html';
      } else {
        alert(data.error);
      }

    } catch (err) {
      alert('Cannot connect to server. Make sure Flask is running!');
    }

  });
</script>

</body>
</html>
